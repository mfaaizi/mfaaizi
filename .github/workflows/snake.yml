name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: mfaaizi
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=000000&color_dots=%23ebedf0,%23d9d9d9,%23bfbfbf,%23999999,%23666666
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=000000

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
