name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: Platane/snk@v3
        with:
          github_user_name: mfaaizi

          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=C0C0C0&color_dots=%23ebedf0,%23d1d5db,%239ca3af,%236b7280,%234b5563

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
